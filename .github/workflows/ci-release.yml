name: CI / Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    outputs:
      artifact-id: ${{ steps.upload.outputs.artifact-id }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.x'

      - name: Restore
        run: dotnet restore Shadowstrap/Shadowstrap.csproj

      - name: Build
        run: dotnet build Shadowstrap/Shadowstrap.csproj -c Release --no-restore

      - name: Publish
        run: >
          dotnet publish Shadowstrap/Shadowstrap.csproj
          -c Release -r win-x64 --self-contained false
          -p:PublishSingleFile=true
          -p:CommitHash=${{ github.sha }}
          -o publish

      - name: Upload artifact
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: Shadowstrap-${{ github.sha }}
          path: publish/Shadowstrap.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: Shadowstrap-${{ github.sha }}
          path: release

      - name: Rename exe
        run: mv release/Shadowstrap.exe release/Shadowstrap-${{ github.ref_name }}.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Shadowstrap ${{ github.ref_name }}
          body: |
            ## Shadowstrap ${{ github.ref_name }}

            ### Installation
            1. Download `Shadowstrap-${{ github.ref_name }}.exe` below
            2. Run it — Shadowstrap will install and register itself
            3. Launch any Roblox game as normal

            > **Note:** Windows SmartScreen may show a warning. Click **More info → Run anyway**.
            > You will also need the [.NET 6 Desktop Runtime](https://dotnet.microsoft.com/en-us/download/dotnet/6.0) if not already installed.

            ### What's New
            See the [commit history](https://github.com/binx-ux/shadowstrap/commits/main) for a full list of changes.
          files: release/Shadowstrap-${{ github.ref_name }}.exe
          draft: false
          prerelease: false
