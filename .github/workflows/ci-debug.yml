name: CI (Debug)

on: [push, pull_request]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.x'

      - name: Restore
        run: dotnet restore Shadowstrap/Shadowstrap.csproj

      - name: Build
        run: dotnet build Shadowstrap/Shadowstrap.csproj --no-restore

      - name: Publish
        run: >
          dotnet publish Shadowstrap/Shadowstrap.csproj
          -p:PublishSingleFile=true
          -p:CommitHash=${{ github.sha }}
          -p:CommitRef=${{ github.ref_type }}/${{ github.ref_name }}
          -r win-x64 -c Debug --self-contained false
          -o publish-debug

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Shadowstrap-Debug-${{ github.sha }}
          path: publish-debug/Shadowstrap.exe
